<script>
/* ============================================================
   UPDATED GACHA LOGIC (5 PULLS: 3 WISHES + 2 CHARACTERS)
   ============================================================ */
const FRIENDSHIP_WISHES = [
  // 3 Birthday Wishes
  { type: "wish", en: { title: "A True Friend", body: "Every moment hanging out with you is always a blast." }, ru: { title: "Настоящий друг", body: "Каждое мгновение с тобой — это всегда весело." } },
  { type: "wish", en: { title: "Endless Joy", body: "I hope this coming year brings you tons of laughter." }, ru: { title: "Бесконечная радость", body: "Пусть этот год принесет тебе море смеха." } },
  { type: "wish", en: { title: "The Best Vibe", body: "You bring great energy to everyone. Happy Birthday!" }, ru: { title: "Лучший вайб", body: "Ты даришь потрясающую энергию. С днём рождения!" } },
  // 2 Character Pulls
  { type: "character", en: { title: "Kazuha", body: "Kazuha joins the party! A wanderer of the wind." }, ru: { title: "Кадзуха", body: "Кадзуха присоединяется к отряду!" } },
  { type: "character", en: { title: "Sandrone", body: "Sandrone appears! Mysterious and elegant." }, ru: { title: "Сандрон", body: "Появилась Сандрон! Таинственная и элегантная." } }
];

// Randomize the 5 pulls
let shuffledPool = [...FRIENDSHIP_WISHES].sort(() => Math.random() - 0.5);
let totalWishesExecuted = 0;

function executeWishDrawSequence() {
  if(activeGachaCutsceneActive || totalWishesExecuted >= 5) return;
  activeGachaCutsceneActive = true;
  
  const wishContent = shuffledPool[totalWishesExecuted];
  totalWishesExecuted++;
  
  // Update UI counter
  $('wishProgress').textContent = "Wishes Remaining: " + (5 - totalWishesExecuted);
  
  currentWishData = {
    kind: wishContent.type === "character" ? "Character Pull" : "Birthday Wish",
    title: wishContent[currentLang].title,
    body: wishContent[currentLang].body
  };
  
  runCinematicMeteorLayer();
}

// Ensure the trigger at the end of the 5th pull goes to the cake stage
function terminateCutsceneAndRenderModal() {
  // ... (Your original modal logic) ...
  // When closing the modal:
  if (totalWishesExecuted >= 5) {
     setTimeout(() => { navigateToStage(4); }, 400);
  }
}
